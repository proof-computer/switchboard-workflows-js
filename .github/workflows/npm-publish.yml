name: npm Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npmjs.com. Leave false for a dry run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Verify release tag matches package version
        if: ${{ github.event_name == 'push' }}
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          fi
      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script"
          fi
      - name: Verify package artifacts
        run: |
          if [ -f scripts/verify-package-artifacts.mjs ]; then
            node scripts/verify-package-artifacts.mjs
          fi
      - name: Check published version
        id: published
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm --userconfig /dev/null view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish }}
        env:
          NODE_AUTH_TOKEN: dry-run
        run: |
          access_args=()
          if node -e "process.exit(require('./package.json').name.startsWith('@') ? 0 : 1)"; then
            access_args=(--access public)
          fi
          npm publish --dry-run "${access_args[@]}"
      - name: Publish
        if: ${{ (github.event_name == 'push' || inputs.publish) && steps.published.outputs.published != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_ACCESS_TOKEN repository secret" >&2
            exit 1
          fi
          access_args=()
          if node -e "process.exit(require('./package.json').name.startsWith('@') ? 0 : 1)"; then
            access_args=(--access public)
          fi
          npm publish --provenance "${access_args[@]}"
      - name: Ensure public package access
        if: ${{ github.event_name == 'push' || inputs.publish }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_ACCESS_TOKEN repository secret" >&2
            exit 1
          fi
          npm access set status=public "$(node -p "require('./package.json').name")"
