name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify release tag matches package version
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          fi
      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script"
          fi
      - name: Verify package artifacts
        run: |
          if [ -f scripts/verify-package-artifacts.mjs ]; then
            node scripts/verify-package-artifacts.mjs
          fi
      - name: Pack release assets
        run: |
          mkdir -p artifacts
          npm pack --json --pack-destination artifacts > "$RUNNER_TEMP/npm-pack.json"
          pkg_file="$(node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'))[0]; console.log(p.filename);" "$RUNNER_TEMP/npm-pack.json")"
          asset_name="$(node -e "const name = require('./package.json').name; console.log(name.replace(/^@proof(?:computer|-computer)\\//, '').replace(/[^a-zA-Z0-9._-]+/g, '-'));")"
          cp "artifacts/$pkg_file" "artifacts/${asset_name}.tgz"
          if [ -f install.sh ]; then
            cp install.sh artifacts/install.sh
          fi
          (
            cd artifacts
            if [ -f install.sh ]; then
              sha256sum *.tgz install.sh > SHA256SUMS
            else
              sha256sum *.tgz > SHA256SUMS
            fi
          )
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME" --verify-tag
          fi
